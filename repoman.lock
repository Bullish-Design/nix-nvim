# repoman.lock — the pinned toolchain for this repo.
#
# One manifest pins every manager (and RepoMan itself) so the whole toolchain
# moves in lockstep. `repoman-sync` reads this and installs the entries for the
# managers selected in `repoman.managers`, plus the [repoman] self entry.
#
# source forms:
#   path:/abs/path                      local checkout (dev)
#   git+https://host/org/repo@vX.Y.Z    pinned git ref (fleet)

[repoman]
package = "repoman"
source = "path:/home/andrew/Documents/Projects/repoman"

[managers.copy]
package = "copyroom"
source = "path:/home/andrew/Documents/Projects/copyroom"

[managers.git]
package = "gitman"
source = "path:/home/andrew/Documents/Projects/gitman"

# gitman's native dependency (Rust/maturin build). repoman-sync installs any
# "<manager>-*" pseudo-entry alongside its manager, keyed off the selected "git" —
# never add "git-pyjutsu" to repoman.managers.
[managers.git-pyjutsu]
package = "pyjutsu"
source = "path:/home/andrew/Documents/Projects/Pyjutsu"
