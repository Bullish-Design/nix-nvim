# Advisory project metadata, read by copyroom (inspect/status) and repoman.
# Every field is optional and defaulted; this declares origin, conventions, hooks.
copyroom:
  version: 1

project:
  kind: generated-project
  name: nix-nvim
  template_id: nix
  template_ref_policy: tagged
  answers_file: .copier-answers.yml

git:
  default_branch: main
  require_clean_worktree: true

devenv:
  enabled: true
  shell_command: devenv shell

commands:
  # Birth (runs only with `copyroom new --trust`): pull the pinned manager
  # toolchain into the venv, put the repo under gitman (jj + colocated git),
  # and seed trunk's first commit from the rendered files.
  post_project_create:
    - "devenv shell -- repoman-sync"
    # put the repo under gitman (jj + colocated git — gitman bootstraps the git
    # itself), then seed trunk's first commit from the rendered files.
    - "devenv shell -- gitman init --colocate --trunk main"
    - "devenv shell -- gitman seed -m 'Initial generation'"
  check:
    - "devenv shell -- repoman doctor"
